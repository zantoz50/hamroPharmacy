version: "3.8"
services:
  mongo:
    image: mongo:6
    container_name: hamropharacy-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: hamroPharacy
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    depends_on:
      - mongo
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=hamroPharacy
      - JWT_SECRET=change_this_secret
      - JWT_EXPIRES=1d
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=admin123
      - CORS_ORIGIN=*
    volumes:
      - ./uploads:/app/uploads
    restart: on-failure

volumes:
  mongo-data:
